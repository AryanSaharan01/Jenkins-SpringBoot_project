services:

  db:
    image: postgres:17
    container_name: postgres_db_jenkins
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: mydb
    volumes:
      - "D:/D Drive/REST APIs/postgres-data:/var/lib/postgresql/data"

  app:
    build: .
    container_name: spring_app_jenkins
    restart: always
    depends_on:
      - db
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: example

  adminer:
    image: adminer
    container_name: adminer_ui_jenkins
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db